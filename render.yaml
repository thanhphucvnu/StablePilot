# Render Blueprint — open https://dashboard.render.com/select-repo?type=blueprint
# Pick repo thanhphucvnu/StablePilot; Render reads this file from repo root.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: stablepilot
    runtime: docker
    dockerfilePath: ./galactica-agent/Dockerfile
    dockerContext: ./galactica-agent
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: HOST
        value: "0.0.0.0"
      - key: SIMULATION_MODE
        value: "true"
      - key: ENABLE_CORS
        value: "true"
