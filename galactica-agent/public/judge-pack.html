<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StablePilot — Judge briefing</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" sizes="any" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "DM Sans", system-ui, sans-serif;
        margin: 0;
        padding: 32px 24px 48px;
        max-width: 920px;
        margin-inline: auto;
        color: #0f172a;
        line-height: 1.5;
        background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
        min-height: 100vh;
      }

      .doc-head {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 1px solid #e2e8f0;
      }

      .doc-head img {
        width: 52px;
        height: 52px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(14, 165, 233, 0.2);
      }

      .doc-head h1 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: #0c1222;
      }

      .doc-head .sub {
        margin: 4px 0 0;
        font-size: 0.85rem;
        color: #64748b;
        font-weight: 500;
      }

      code {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 0.85em;
        background: #e0f2fe;
        padding: 2px 6px;
        border-radius: 4px;
        color: #0369a1;
      }

      pre {
        white-space: pre-wrap;
        word-break: break-word;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        background: #fff;
        padding: 18px;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        font-size: 0.78rem;
        line-height: 1.45;
        box-shadow: 0 4px 20px rgba(15, 23, 42, 0.06);
      }

      button {
        padding: 10px 18px;
        border-radius: 10px;
        border: 0;
        background: linear-gradient(165deg, #7dd3fc, #0ea5e9);
        color: #0c1222;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        box-shadow: 0 2px 12px rgba(14, 165, 233, 0.3);
      }

      button:hover {
        filter: brightness(1.05);
      }

      @media print {
        body {
          background: white;
          padding: 0;
        }
        button {
          display: none;
        }
        pre {
          box-shadow: none;
          border: 1px solid #ccc;
        }
      }
    </style>
  </head>
  <body>
    <header class="doc-head">
      <img src="/logo.svg" width="52" height="52" alt="" />
      <div>
        <h1>StablePilot — Judge briefing</h1>
        <p class="sub">Generated from <code>GET /briefing/judge</code> on the same origin.</p>
      </div>
    </header>
    <p>
      <button type="button" id="refreshBtn">Refresh</button>
    </p>
    <pre id="out">Loading…</pre>
    <script>
      async function load() {
        const out = document.getElementById("out");
        try {
          const r = await fetch("/briefing/judge");
          const j = await r.json();
          out.textContent = JSON.stringify(j, null, 2);
        } catch (e) {
          out.textContent = String(e.message || e);
        }
      }
      document.getElementById("refreshBtn").addEventListener("click", load);
      load();
    </script>
  </body>
</html>
